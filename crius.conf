root = "/var/lib/crius"

[api]
listen = "unix:///run/crius/crius.sock"
# Optional kubeadm compatibility aliases. On blank validation nodes, pick at most
# one standard CRI socket and avoid colliding with an installed runtime.
# listen_aliases = ["unix:///var/run/containerd/containerd.sock"]
# listen_aliases = ["unix:///var/run/crio/crio.sock"]
allow_tcp_service = false
grpc_max_send_msg_size = 83886080
grpc_max_recv_msg_size = 83886080
enable_pod_events = true
included_pod_metrics = ["all"]
stats_collection_period = 0
pod_sandbox_metrics_collection_period = 0
exec_sync_io_drain_timeout = "0s"

[api.streaming]
address = "127.0.0.1"
port = 0
enable_tls = false
tls_cert_file = ""
tls_key_file = ""
tls_ca_file = ""
tls_min_version = "VersionTLS12"
tls_cipher_suites = []
request_token_ttl = "30s"
port_forward_stream_creation_timeout = "30s"
port_forward_idle_timeout = "4h"

[runtime]
runtime_type = "runc"
runtime_path = "/usr/bin/runc"
runtime_config_path = ""
base_runtime_spec = ""
root = "/run/crius"
# platform_runtime_paths = { "linux/amd64" = "/usr/bin/runc" }
handlers = ["runc"]
pause_image = "registry.k8s.io/pause:3.9"
pause_command = "/pause"
pinns_path = ""
drop_infra_ctr = false
cgroup_driver = "systemd"
shim_path = "/usr/bin/crius-shim"
monitor_cgroup = ""
shim_dir = "/run/crius/shims"
attach_socket_dir = "/run/crius/attach"
container_exits_dir = "/run/crius/exits"
clean_shutdown_file = "/var/lib/crius/clean.shutdown"
container_stop_timeout = 30
version_file = "/run/crius/version"
version_file_persist = "/var/lib/crius/version"
criu_path = ""
criu_image_path = ""
criu_work_path = ""
enable_criu_support = true
internal_wipe = true
internal_repair = true
bind_mount_prefix = ""
disable_cgroup = false
tolerate_missing_hugetlb_controller = true
separate_pull_cgroup = ""
uid_mappings = ""
gid_mappings = ""
minimum_mappable_uid = -1
minimum_mappable_gid = -1
io_uid = 0
io_gid = 0
pids_limit = -1
infra_ctr_cpuset = ""
shared_cpuset = ""
exec_cpu_affinity = ""
irqbalance_config_file = ""
irqbalance_config_restore_file = "disable"
read_only = false
no_pivot = false
no_new_keyring = false
shim_debug = false
monitor_env = []
default_env = []

# Example workload profile:
# [runtime.workloads.management]
# activation_annotation = "target.workload.openshift.io/management"
# annotation_prefix = "resources.workload.openshift.io"
# allowed_annotations = ["workload.example/"]
# [runtime.workloads.management.resources]
# cpushares = 2048
# cpuperiod = 100000
# cpulimit = 1500
default_capabilities = [
  "CHOWN",
  "DAC_OVERRIDE",
  "FSETID",
  "FOWNER",
  "MKNOD",
  "NET_RAW",
  "SETGID",
  "SETUID",
  "SETFCAP",
  "SETPCAP",
  "NET_BIND_SERVICE",
  "SYS_CHROOT",
  "KILL",
  "AUDIT_WRITE",
]
default_sysctls = []
default_ulimits = []
allowed_devices = []
additional_devices = []
device_ownership_from_security_context = false
add_inheritable_capabilities = false
default_mounts_file = ""
hooks_dir = []
absent_mount_sources_to_reject = []
disable_proc_mount = false
timezone = ""
log_to_journald = false
no_sync_log = false
restrict_oom_score_adj = false
enable_unprivileged_ports = false
enable_unprivileged_icmp = false

# [runtime.runtimes.kata]
# runtime_path = "/usr/bin/kata-runtime"
# runtime_config_path = "/etc/kata/config.toml"
# runtime_root = "/run/crius/kata"
# platform_runtime_paths = { "linux/amd64" = "/usr/bin/kata-runtime-amd64" }
# inherit_default_runtime = false
# monitor_path = "/usr/bin/kata-shim"
# monitor_cgroup = "system.slice"
# monitor_env = ["PATH=/opt/kata/bin:/usr/bin"]
# stream_websockets = false
# allowed_annotations = ["io.example.runtime/"]
# [runtime.runtimes.kata.default_annotations]
# "io.example.runtime/default" = "kata"
# privileged_without_host_devices = false
# privileged_without_host_devices_all_devices_allowed = false
# container_create_timeout = 600
# snapshotter = "internal-cached-rootfs"
# cni_conf_dir = "/etc/cni/kata.d"
# cni_max_conf_num = 1
#
# Example external snapshotter:
# [image.external_snapshotters.stargz]
# type = "proxy"
# endpoint = "unix:///run/containerd-stargz-grpc/containerd-stargz-grpc.sock"
# path = ""
# capabilities = ["remote", "lazy-pull"]

[security]
seccomp_profile = ""
privileged_seccomp_profile = "unconfined"
unset_seccomp_profile = "runtime/default"
apparmor_default_profile = "crius-default"
disable_apparmor = false
enable_selinux = false
selinux_category_range = 1024
hostnetwork_disable_selinux = true

[image]
driver = "overlay"
root = "/var/lib/containers/storage"
global_auth_file = ""
namespaced_auth_dir = ""
default_transport = "docker://"
short_name_mode = "disabled"
pull_progress_timeout = "0s"
max_concurrent_downloads = 3
pull_retry_count = 0
registry_config_dir = ""
decryption_keys_path = ""
decryption_decoder_path = "ctd-decoder"
decryption_keyprovider_config = ""
additional_artifact_stores = []
signature_policy = ""
signature_policy_dir = ""
storage_options = []
image_volumes = "mkdir"
pinned_images = []
big_files_temporary_dir = ""
oci_artifact_mount_support = true

[image.external_snapshotters]

[network]
plugin = "cni"
config_dirs = ["/etc/cni/net.d", "/etc/kubernetes/cni/net.d"]
plugin_dirs = ["/opt/cni/bin", "/usr/lib/cni", "/usr/libexec/cni"]
cache_dir = "/var/lib/cni/cache"
# conf_template = "/etc/cni/net.d/10-crius.template"
# max_conf_num = 1
# ip_pref = "ipv4"
# teardown_timeout = "1m"
# default_network_name = "crio-bridge"
# disable_hostport_mapping = false
# netns_mounts_under_state_dir = true

[network.local]
config_dirs = ["/etc/crius/cni/net.d"]
plugin_dirs = ["/opt/cni/bin", "/usr/lib/cni", "/usr/libexec/cni"]
cache_dir = "/var/lib/cni/crius-local-cache"

[network.cri]
config_dirs = ["/etc/cni/net.d", "/etc/kubernetes/cni/net.d"]
plugin_dirs = ["/opt/cni/bin", "/usr/lib/cni", "/usr/libexec/cni"]
cache_dir = "/var/lib/cni/cache"

[logging]
level = "info"
dir = "/var/log/crius"
max_container_log_line_size = 4096

[metrics]
enable = false
host = "127.0.0.1"
port = 9090
socket_path = ""
enable_tls = false
tls_cert_file = ""
tls_key_file = ""
tls_ca_file = ""
tls_min_version = "VersionTLS12"
tls_cipher_suites = []
collectors = ["runtime", "resources", "images"]

[tracing]
enable = false
endpoint = ""
sampling_rate_per_million = 0

[nri]
enable = false
enable_cdi = true
runtime_name = "crius"
runtime_version = "0.1.0"
socket_path = "/run/crius/nri.sock"
plugin_path = "/opt/nri/plugins"
plugin_config_path = "/etc/nri/conf.d"
blockio_config_path = ""
cdi_spec_dirs = ["/etc/cdi", "/var/run/cdi"]
allowed_annotation_prefixes = []
workload_allowed_annotation_prefixes = []
registration_timeout_ms = 5000
request_timeout_ms = 2000
enable_external_connections = false

[nri.runtime_allowed_annotation_prefixes]

[nri.default_validator]
enable = false
reject_oci_hook_adjustment = false
reject_runtime_default_seccomp_adjustment = false
reject_unconfined_seccomp_adjustment = false
reject_custom_seccomp_adjustment = false
reject_namespace_adjustment = false
required_plugins = []
tolerate_missing_plugins_annotation = ""

[rootless]
enabled = false
uid_mappings = []
gid_mappings = []
sub_uid_start = 100000
sub_uid_count = 65536
sub_gid_start = 100000
sub_gid_count = 65536
auto_configure_subids = true
use_fuse_overlayfs = true
network_mode = "Slirp4netns"
xdg_runtime_dir = ""
xdg_data_home = ""
storage_root = ""
runtime_root = ""
netns_dir = ""
slirp4netns_path = "slirp4netns"
pasta_path = "pasta"
